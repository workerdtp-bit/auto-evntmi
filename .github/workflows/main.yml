name: EVN Scraper Daily

on:
  schedule:
    # 04:00 UTC tương ứng với 11:00 giờ Việt Nam (GMT+7)
    - cron: '00 04 * * 6'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240 
    
    # Sửa lỗi căn lề (indentation) cho biến môi trường
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      # Cập nhật lên các phiên bản vá lỗi để tương thích hoàn toàn với Node 24
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas webdriver-manager openpyxl gspread google-auth

      - name: Run scraper
        env:
          GCP_JSON: ${{ secrets.GCP_JSON }}
        run: |
          export PYTHONUNBUFFERED=1
          python main.py

      - name: Upload results
        if: always() 
        uses: actions/upload-artifact@v5
        with:
          name: evn-result
          path: |
            datasauget.csv
            output.xlsx
